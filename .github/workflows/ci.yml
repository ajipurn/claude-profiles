name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # SwiftPM build + hand-assembled, ad-hoc signed bundle — same script as
      # local builds. The xcodegen project is for editing in Xcode only; its
      # single-target layout cannot resolve the ClaudeProfilesCore module.
      - name: Build app bundle
        run: sh scripts/make-app.sh "${GITHUB_REF_NAME#v}" "${{ github.run_number }}"
      - name: Package as DMG
        run: |
          mkdir dmg
          mv "dist/Claude Profiles.app" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create -volname "Claude Profiles" -srcfolder dmg -ov -format UDZO ClaudeProfiles.dmg
      - run: gh release create "$GITHUB_REF_NAME" ClaudeProfiles.dmg --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
