name: ClaudeProfiles
options:
  bundleIdPrefix: dev.local
  deploymentTarget:
    macOS: "13.0"
targets:
  ClaudeProfiles:
    type: application
    platform: macOS
    sources:
      - Sources/ClaudeProfiles
      - Sources/ClaudeProfilesCore
      - path: Resources
        buildPhase: resources
    info:
      path: Support/Info.plist
      properties:
        LSUIElement: true
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: "1.4.0"
        CFBundleVersion: "23"
        CFBundleName: Claude Profiles
        CFBundleDisplayName: Claude Profiles
        NSHumanReadableCopyright: ""
        CFBundleURLTypes:
          - CFBundleURLName: dev.local.ClaudeProfiles
            CFBundleURLSchemes: [claudeprofiles]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.local.ClaudeProfiles
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        # No entitlements file on purpose: App Sandbox stays OFF (the app must
        # write to ~/Library/Application Support and manage Claude's lifecycle).
